<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchElite | The Art of Time ⌚✨</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Navigation Bar - NEW */
        .navbar {
            position: fixed;
            top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 12px 30px;
            z-index: 100;
            display: flex;
            gap: 25px;
        }
        .nav-link {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-link:hover { color: var(--gold); transform: translateY(-2px); }

        /* Luxury Header */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), 
                        url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-attachment: fixed;
            text-align: center;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--gold);
            margin: 0;
            letter-spacing: 15px;
            text-transform: uppercase;
            animation: glow 3s ease-in-out infinite alternate;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        header p {
            letter-spacing: 5px;
            font-size: 1.2rem;
            margin-top: 10px;
            color: #ccc;
        }

        /* Blog Grid */
        .container {
            max-width: 1100px;
            margin: -100px auto 100px;
            padding: 20px;
            display: grid;
            gap: 40px;
        }

        .blog-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .blog-card:nth-child(even) { flex-direction: row-reverse; }

        /* Date Badge - NEW */
        .date-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--gold);
            color: var(--bg);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(212,175,55,0.4);
        }

        .blog-img {
            flex: 1;
            min-height: 400px;
            background-size: cover;
            background-position: center;
            filter: grayscale(40%);
            position: relative;
        }

        .blog-card:hover .blog-img { 
            filter: grayscale(0%) brightness(1.1); 
            transform: scale(1.05); 
        }

        .blog-info {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .meta-tag {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .blog-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        .blog-info p {
            color: #999;
            font-size: 1rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Read More Button - IMPROVED */
        .read-more {
            margin-top: 20px;
            color: var(--gold);
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Modal / Read Mode */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            overflow-y: auto;
            padding: 60px 20px;
        }

        .modal-inner {
            max-width: 800px;
            margin: 0 auto;
            animation: slideUp 0.6s ease;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 50px;
        }

        .modal-inner h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 3.5rem; }
        .modal-inner .example-box { 
            background: rgba(212,175,55,0.1); 
            padding: 25px; 
            border-left: 4px solid var(--gold);
            margin: 30px 0;
            font-style: italic;
            border-radius: 10px;
            position: relative;
        }
        .modal-inner .example-box::before {
            content: '💎';
            position: absolute;
            top: -15px; left: 20px;
            background: var(--bg);
            padding: 5px 12px;
            font-size: 1rem;
            border-radius: 50%;
        }

        .close-btn {
            position: fixed;
            top: 30px; right: 40px;
            font-size: 3rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .close-btn:hover { color: var(--gold); transform: rotate(90deg); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(212,175,55,0.5); }
            to { text-shadow: 0 0 40px rgba(212,175,55,0.8); }
        }

        @media (max-width: 768px) {
            .blog-card { flex-direction: column !important; }
            .blog-card:nth-child(even) { flex-direction: column; }
            .blog-info { padding: 30px; }
            .navbar { padding: 10px 20px; gap: 15px; flex-wrap: wrap; }
        }
		/* Social Share ka naya design */
.share-container {
    display: flex;
    gap: 15px;
    margin: 30px 0;
    align-items: center;
}
.share-icon {
    color: #fff;
    width: 40px; height: 40px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: 0.3s;
}
.share-icon:hover {
    background: var(--gold);
    color: #000;
}
/* 1. Blog Card par hover karne par shadow badhegi */
.blog-card:hover {
    transform: translateY(-10px); /* Card thoda upar uthega */
    box-shadow: 0 30px 60px rgba(212, 175, 55, 0.15); /* Gold shadow effect */
    border-color: var(--gold); /* Border gold ho jayegi */
}

/* 2. Image Zoom Effect */
.blog-img {
    flex: 1;
    min-height: 400px;
    background-size: cover;
    background-position: center;
    filter: grayscale(30%) brightness(0.8); /* Default mein thodi dark aur classy */
    transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
    overflow: hidden;
}

/* Hover karne par image khul kar dikhegi */
.blog-card:hover .blog-img { 
    filter: grayscale(0%) brightness(1.1); 
    transform: scale(1.08); /* Halki si zoom hogi */
}

/* 3. Button Arrow Animation */
.read-more i {
    transition: transform 0.3s ease;
}

.blog-card:hover .read-more i {
    transform: translateX(10px); /* Arrow aage move karega */
}
    </style>

    const grid = document.getElementById('blog-grid');
    posts.forEach((post, i) => {
        grid.innerHTML += `
            <div class="blog-card" onclick="openPost(${i})">
                <div class="blog-img" style="background-image: url('${post.img}')">
                    <div class="date-badge">📅 ${post.date}</div>
                </div>
                <div class="blog-info">
                    <span class="meta-tag">${post.category}</span>
                    <h2>${post.title}</h2>
                    <p>${post.content}</p>
                    <div class="read-more">
                        <i class="fas fa-arrow-right"></i> EXPLORE MORE →
                    </div>
                </div>
            </div>
        `;
    });

    function openPost(i) {
    // 1. Pehle data fetch karo (Post ki details)
    const post = posts[i]; 
    
    // 2. Phir links banao
    const postUrl = window.location.href; 
    const postTitle = encodeURIComponent(post.title);

    // 3. Phir HTML mein inject karo
    document.getElementById('modal-content').innerHTML = `
        <span class="meta-tag">${post.category}</span>
        <p style="font-size:0.8rem; opacity:0.6;">📅 ${post.date} | Keywords: ${post.keywords}</p>
        <h1>${post.title}</h1>
        
        <p style="font-size:1.4rem; line-height:1.8;">${post.content}</p>
        
        <div class="share-container">
            <span style="font-size: 0.8rem; color: var(--gold); letter-spacing: 2px;">SHARE ARTICLE:</span>
            <a href="https://www.instagram.com/" target="_blank" class="share-icon"><i class="fab fa-instagram"></i></a>
            <a href="https://api.whatsapp.com/send?text=${postTitle}%20${postUrl}" target="_blank" class="share-icon"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/sharer/sharer.php?u=${postUrl}" target="_blank" class="share-icon"><i class="fab fa-facebook-f"></i></a>
        </div>

        <div class="example-box">
            <strong>Real-World Scenario:</strong><br>${post.example}
        </div>
        
        <p style="font-size:1.2rem; line-height:1.8;">${post.summary}</p>
        
        <hr style="border:0; border-top:1px solid #333; margin:50px 0;">
        <p style="text-align:center; color:var(--gold);">Elite Perspective • Reference: Patek Philippe & Rolex Standards ✨</p>
    `;

    document.getElementById('readModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
}

    function closePost() {
        document.getElementById('readModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
