<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join WatchElite | Premium Membership</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Background image of a luxury watch */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1547996160-81dfa63595aa?q=80&w=1887&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* Glassmorphism Card */
        .signup-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .signup-container h2 {
            color: #fff;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .signup-container p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #d4af37; /* Gold Color */
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #00eaff; /* Neon Blue focus */
            background: rgba(255, 255, 255, 0.2);
        }

        /* Submit Button */
        .signup-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #d4af37, #f9d976); /* Gold Gradient */
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        .signup-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);
        }

        .footer-text {
            margin-top: 20px;
            color: #888;
            font-size: 13px;
        }

        .footer-text a {
            color: #00eaff;
            text-decoration: none;
        }

        /* Logo Animation */
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #00eaff, #00ff88);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="logo">WatchElite</div>
        <h2>Create Account</h2>
        <p>Join the world of timeless luxury.</p>

        <form action="#">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="signup-btn">Get Started</button>
        </form>

        <div class="footer-text">
            Already a member? <a href="login.html">Log In</a>
        </div>
    </div>
<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault(); // Ye page ko refresh hone se rokega

        // Yahan hum ek success message dikhayenge
        alert("Welcome to WatchElite! ✨\nYour account has been created successfully.");

        // Successful sign up ke baad user ko login page ya home page par bhejne ke liye:
        window.location.href = "SM.html"; 
    });
</script>
</body>
</html>
