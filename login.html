<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Luxe | Member Authentication</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(212, 175, 55, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.02);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(45deg, #D4AF37, #F7E98E, #D4AF37);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .login-card:hover::before,
        .login-card.success::before {
            opacity: 1;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo svg {
            width: 48px;
            height: 48px;
            fill: #D4AF37;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #D4AF37, #F7E98E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .form-title {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .form-subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 15px;
            margin-bottom: 36px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-field:focus {
            border-color: #D4AF37;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .input-field.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #D4AF37 0%, #F7E98E 100%);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 25px -5px rgba(212, 175, 55, 0.3), 0 10px 10px -5px rgba(212, 175, 55, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Success State */
        .success-state {
            display: none;
            text-align: center;
            padding-top: 24px;
        }

        .success-state.show {
            display: block;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #D4AF37, #F7E98E);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: #1a1a1a;
            font-weight: bold;
            box-shadow: 0 20px 25px -5px rgba(212, 175, 55, 0.3);
        }

        .success-title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .success-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 8px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: loading 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes loading {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .form-section {
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-out {
            animation: fadeOut 0.4s ease-out forwards;
        }

        @keyframes fadeOut {
            to { 
                opacity: 0; 
                transform: translateY(-10px); 
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 24px;
                margin: 10px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card" id="loginCard">
            <div class="logo">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2L2 7v10c0 5.55 3.84 9.74 9 11a9.39 9.39 0 0 0 5-1V7l-10-5z"/>
                </svg>
                <h1>Watch Luxe</h1>
            </div>

            <div id="loginForm" class="form-section">
                <h2 class="form-title">Login Authentication 🛡️</h2>
                <p class="form-subtitle">Please enter your credentials to access your collection</p>
                 <div class="form-group">
    <input 
        type="email"  id="memberEmail" 
        class="input-field" 
        placeholder="Email Address"
        autocomplete="email"
        required
    >
</div>
                 <div class="form-group">
    <input 
        type="password" 
        id="securityCode"
        class="input-field" 
        placeholder="Security Code "
        required
    >
</div>
                
                <button class="btn" id="loginBtn">
                    <span id="btnText">Enter Vault</span>
                    <div id="loadingDots" class="loading-dots" style="display: none;">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </button>
            </div>

            <div id="successState" class="success-state">
                <div class="success-icon">✓</div>
                <h2 class="success-title">Welcome !!!</h2>
                <p class="success-subtitle">
                    You are now authenticated as a valued member of Watch Luxe. 🔒
                    <br><strong>Accessing your exclusive collection...</strong>
                </p>
            </div>
        </div>
    </div>

   <script>
class AuthHandler {
    constructor() {
        // IDs must match HTML
        this.memberIdInput = document.getElementById('memberEmail'); 
        this.securityCodeInput = document.getElementById('securityCode');
        this.loginBtn = document.getElementById('loginBtn');
        this.btnText = document.getElementById('btnText');
        this.loadingDots = document.getElementById('loadingDots');
        this.loginForm = document.getElementById('loginForm');
        this.successState = document.getElementById('successState');
        this.loginCard = document.getElementById('loginCard');

        this.init(); // Yeh niche wale init() ko call karega
    }

    init() {
        // Click event listener
        this.loginBtn.addEventListener('click', () => this.handleLogin());

        // Enter key support
        [this.memberIdInput, this.securityCodeInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    this.handleLogin();
                }
            });
        });
    }

    validateInputs() {
        let isValid = true;
        const emailValue = this.memberIdInput.value.trim();
        const securityCode = this.securityCodeInput.value.trim();

        // Reset previous errors
        this.memberIdInput.classList.remove('error');
        this.securityCodeInput.classList.remove('error');

        // Check if fields are empty or invalid
        if (!emailValue || !emailValue.includes('@')) {
            this.memberIdInput.classList.add('error');
            isValid = false;
        }

        if (!securityCode) {
            this.securityCodeInput.classList.add('error');
            isValid = false;
        }

        // Agar valid nahi hai toh alert dikhao
        if (!isValid) {
            alert("Please enter valid credentials!.");
        }

        return isValid;
    }

    showLoading() {
        this.btnText.style.opacity = '0';
        this.loadingDots.style.display = 'inline-flex';
        this.loginBtn.disabled = true;
    }

    hideLoading() {
        this.btnText.style.opacity = '1';
        this.loadingDots.style.display = 'none';
        this.loginBtn.disabled = false;
    }

    async handleLogin() {
        // 1. Validation Check
        if (!this.validateInputs()) {
            return;
        }

        // 2. Loading animation
        this.showLoading();
        
        // Fake delay for effect
        await new Promise(resolve => setTimeout(resolve, 1500));

        this.hideLoading();
        
        // 3. Show Success State
        this.loginForm.classList.add('fade-out');
        setTimeout(() => {
            this.loginForm.style.display = 'none';
            this.successState.classList.add('show');
            this.loginCard.classList.add('success');
        }, 400);
    }
}

// Initialize on load
document.addEventListener('DOMContentLoaded', () => {
    new AuthHandler();
});
</script>
</body>
</html>
