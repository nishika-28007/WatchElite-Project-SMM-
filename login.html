<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WatchElite Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1999&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(45deg, #d4af37, #fff);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        h2 { color: #fff; margin-bottom: 5px; font-weight: 400; }
        p { color: #888; font-size: 13px; margin-bottom: 30px; }

        .input-box { margin-bottom: 20px; text-align: left; }
        .input-box label { color: #d4af37; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #00eaff; background: rgba(255, 255, 255, 0.15); }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #00eaff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(0, 234, 255, 0.4); }

        .links { margin-top: 20px; font-size: 13px; color: #bbb; }
        .links a { color: #d4af37; text-decoration: none; font-weight: 600; }

        #msg { margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">WatchElite</div>
        <h2>Welcome Back</h2>
        <p>Enter your credentials to access your vault.</p>

        <form id="loginForm">
            <div class="input-box">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" id="pass" placeholder="Enter password" required>
            </div>

            <button type="submit" class="login-btn">Login Now</button>
        </form>

        <p id="msg"></p>

        <div class="links">
            Don't have an account? <a href="signup.html">Create One</a>
            <br><br>
            <a href="index.html" style="color: #888; font-weight: 400; font-size: 12px;">← LOG OUT</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let msg = document.getElementById('msg');
            
            // Success Effect
            msg.style.display = "block";
            msg.style.color = "#00ff88";
            msg.innerText = "Verifying Identity... Please wait.";

            setTimeout(() => {
                alert("Login Successful! Welcome to WatchElite.");
                 // Home page par le jayega
            }, 1500);
        });
    </script>

</body>
</html>
